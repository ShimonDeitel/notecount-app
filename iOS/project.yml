name: Notecount
options:
  bundleIdPrefix: com.shimondeitel.notecount
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Notecount:
    type: application
    platform: iOS
    sources:
      - path: Notecount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.notecount
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Notecount/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  NotecountTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NotecountTests
      - path: Notecount.storekit
    dependencies:
      - target: Notecount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.notecount.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  NotecountUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: NotecountUITests
    dependencies:
      - target: Notecount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.notecount.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Notecount:
    build:
      targets:
        Notecount: all
        NotecountTests: [test]
        NotecountUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Notecount.storekit
    test:
      config: Debug
      storeKitConfiguration: Notecount.storekit
      targets:
        - NotecountTests
        - NotecountUITests
    archive:
      config: Release
